name: Live rating refresh

on:
  schedule:
    - cron: '4,19,34,49 * * * *'
  workflow_dispatch:
    inputs:
      ftd_ids:
        description: 'FTD tournament IDs (space-separated); overrides the FTD_IDS repo variable'
        required: false
        default: ''

concurrency:
  group: live-refresh
  cancel-in-progress: false

permissions:
  contents: write   # commit enriched tournament_*.json caches back

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Determine FTD IDs (gate)
        id: gate
        env:
          INPUT_IDS: ${{ inputs.ftd_ids }}
          VAR_IDS: ${{ vars.FTD_IDS }}
        run: |
          IDS="${INPUT_IDS:-$VAR_IDS}"
          echo "ids=$IDS" >> "$GITHUB_OUTPUT"
          if [ -z "$IDS" ]; then
            echo "FTD_IDS empty - live refresh disabled, skipping."
          else
            echo "Refreshing FTDs: $IDS"
          fi

      - name: Checkout pipeline
        if: steps.gate.outputs.ids != ''
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.gate.outputs.ids != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        if: steps.gate.outputs.ids != ''
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Clone pages repo (worldothellorating)
        if: steps.gate.outputs.ids != ''
        env:
          DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git clone git@github.com:tomschotte-personal/worldothellorating.git fide_rating/pages

      # GitHub's cron scheduler is unreliable (observed gaps of 1-2h on a 15-min
      # cron). Each run therefore LOOPS for ~65 minutes, refreshing every ~6 min.
      # Combined with the concurrency group (queued, not cancelled), even an
      # hourly-throttled cron yields continuous coverage.
      - name: Refresh loop (~65 min, every ~6 min)
        if: steps.gate.outputs.ids != ''
        working-directory: fide_rating
        run: |
          git config --global user.name "othello-rating-bot"
          git config --global user.email "actions@github.com"
          DEADLINE=$(( $(date +%s) + 65*60 ))
          ITER=0
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            ITER=$((ITER+1))
            echo "=== iteration $ITER — $(date -u '+%H:%M:%S UTC') ==="
            python shift1800_live.py --refresh ${{ steps.gate.outputs.ids }} || echo "compute failed — retrying next iteration"
            python shift1800_html.py || echo "html failed — retrying next iteration"
            (
              cd pages
              git add index.html
              if git diff --cached --quiet; then
                echo "No changes to publish."
              else
                git commit -m "Live refresh $(date -u '+%Y-%m-%d %H:%M UTC') (GitHub Actions)"
                git push origin main || (git pull --rebase origin main && git push origin main)
              fi
            )
            [ "$(date +%s)" -lt "$DEADLINE" ] && sleep 240
          done
          echo "Loop finished after $ITER iterations."

      - name: Commit enriched FTD caches back
        if: steps.gate.outputs.ids != ''
        run: |
          git config user.name "othello-rating-bot"
          git config user.email "actions@github.com"
          git add tournament_*.json
          if git diff --cached --quiet; then
            echo "Caches unchanged."
          else
            git commit -m "Update FTD caches ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git pull --rebase origin main
            git push origin main
          fi
