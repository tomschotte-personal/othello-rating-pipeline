name: Live rating refresh

on:
  schedule:
    # Weekends only (Sat/Sun) — tournaments rarely run on weekdays. For a
    # weekday event, use workflow_dispatch (manual run) instead.
    - cron: '4,19,34,49 * * * 6,0'
  workflow_dispatch:
    inputs:
      ftd_ids:
        description: 'FTD tournament IDs (space-separated); overrides the FTD_IDS repo variable'
        required: false
        default: ''

concurrency:
  group: live-refresh
  cancel-in-progress: false

permissions:
  contents: write   # commit enriched tournament_*.json caches + .ftd_auto back

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pipeline
        uses: actions/checkout@v4

      # Tracking windows come from three sources, in priority order:
      #   1. workflow_dispatch input (manual, bypasses FTD_UNTIL)
      #   2. FTD_IDS / FTD_UNTIL repo variables (manual arm)
      #   3. .ftd_auto committed file "ids|until" (armed by the weekend sweep)
      # With no window at all, weekend daytime runs sweep FTD for tournaments
      # starting today and arm automatically.
      - name: Determine FTD IDs (gate)
        id: gate
        env:
          INPUT_IDS: ${{ inputs.ftd_ids }}
          VAR_IDS: ${{ vars.FTD_IDS }}
          VAR_UNTIL: ${{ vars.FTD_UNTIL }}
        run: |
          IDS="${INPUT_IDS:-$VAR_IDS}"
          UNTIL="$VAR_UNTIL"
          if [ -z "$IDS" ] && [ -f .ftd_auto ]; then
            IDS=$(cut -d'|' -f1 .ftd_auto)
            UNTIL=$(cut -d'|' -f2 .ftd_auto)
            echo "Auto-armed window from .ftd_auto: $IDS until $UNTIL"
          fi
          MODE="live"
          NOW=$(date -u '+%Y-%m-%dT%H:%M')
          # Window end (UTC): time-based auto-off. A manual dispatch with
          # explicit IDs bypasses it.
          if [ -n "$IDS" ] && [ -n "$UNTIL" ] && [ -z "$INPUT_IDS" ]; then
            if [[ "$NOW" > "$UNTIL" ]]; then
              MODE="finalize"   # one-time: convert tracked FTDs to permanent .ELO
            fi
          fi
          # A window the marker says is already finalized is CLOSED: fall
          # through to the sweep/skip decision instead of exiting on the
          # finalize path forever (stale FTD_IDS variable scenario).
          if [ "$MODE" = "finalize" ] && [ "$(cat .ftd_finalized 2>/dev/null)" = "$IDS@$UNTIL" ]; then
            echo "Window $IDS@$UNTIL already finalized - treating as no active window."
            IDS=""
            UNTIL=""
            MODE="live"
          fi
          if [ -z "$IDS" ]; then
            MODE="skip"
            DOW=$(date -u +%u)
            HOUR=$((10#$(date -u +%H)))
            if { [ "$DOW" = 6 ] || [ "$DOW" = 7 ]; } && [ "$HOUR" -ge 5 ] && [ "$HOUR" -le 15 ]; then
              MODE="sweep"
              echo "No active window - weekend daytime, sweeping FTD for live events."
            else
              echo "No FTD window and outside sweep hours - skipping."
            fi
          fi
          echo "ids=$IDS" >> "$GITHUB_OUTPUT"
          echo "until=$UNTIL" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Mode: $MODE  IDs: $IDS  Until: ${UNTIL:-unbounded}"

      - name: Set up Python
        if: steps.gate.outputs.mode != 'skip'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        if: steps.gate.outputs.mode != 'skip'
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Sweep FTD for tournaments starting today
        id: sweep
        if: steps.gate.outputs.mode == 'sweep'
        run: |
          git config --global user.name "othello-rating-bot"
          git config --global user.email "actions@github.com"
          cd fide_rating
          RESULT=$(python ftd_sweep.py | grep -E '^(ARM|NONE)' | tail -1 || echo NONE)
          cd ..
          echo "Sweep result: $RESULT"
          if [[ "$RESULT" == ARM* ]]; then
            IDS=$(echo "$RESULT" | sed -E 's/^ARM ids=(.*) until=.*/\1/')
            UNTIL=$(echo "$RESULT" | sed -E 's/^.* until=//')
            echo "$IDS|$UNTIL" > .ftd_auto
            git add .ftd_auto tournament_*.json
            git commit -m "Auto-arm live window: FTD $IDS until $UNTIL UTC"
            git pull --rebase origin main && git push origin main
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "ids=$IDS" >> "$GITHUB_OUTPUT"
            echo "until=$UNTIL" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone pages repo (worldothellorating)
        if: steps.gate.outputs.mode == 'live' || steps.gate.outputs.mode == 'finalize' || steps.sweep.outputs.found == 'true'
        env:
          DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git clone git@github.com:tomschotte-personal/worldothellorating.git fide_rating/pages

      - name: Finalize tracking window (convert FTDs to permanent .ELO)
        if: steps.gate.outputs.mode == 'finalize'
        run: |
          git config --global user.name "othello-rating-bot"
          git config --global user.email "actions@github.com"
          cd fide_rating
          for TID in ${{ steps.gate.outputs.ids }}; do
            python -c "from ftd_to_elo import convert; convert($TID, synthetic_ids=True)" \
              || echo "convert $TID failed - its cache remains for manual handling"
          done
          # Recompute + publish once WITHOUT the FTD overlay (the new .ELO files
          # now carry those games via the post-baseline overlay).
          python shift1800_live.py || true
          python shift1800_html.py || true
          (
            cd pages
            git add index.html
            git diff --cached --quiet || (git commit -m "Finalize live window $(date -u '+%Y-%m-%d %H:%M UTC')" && git push origin main)
          )
          cd ..
          echo "${{ steps.gate.outputs.ids }}@${{ steps.gate.outputs.until }}" > .ftd_finalized
          rm -f .ftd_auto
          git add -A
          git diff --cached --quiet || (git commit -m "Finalize window: permanent .ELO for FTDs ${{ steps.gate.outputs.ids }}" && git pull --rebase origin main && git push origin main)

      # GitHub's cron scheduler is unreliable (observed gaps of 1-2h on a 15-min
      # cron). Each run therefore LOOPS for ~65 minutes, refreshing every ~6 min.
      # Combined with the concurrency group (queued, not cancelled), even an
      # hourly-throttled cron yields continuous coverage.
      - name: Refresh loop (~65 min, every ~6 min)
        if: steps.gate.outputs.mode == 'live' || steps.sweep.outputs.found == 'true'
        working-directory: fide_rating
        run: |
          git config --global user.name "othello-rating-bot"
          git config --global user.email "actions@github.com"
          IDS="${{ steps.gate.outputs.ids }}"
          UNTIL="${{ steps.gate.outputs.until }}"
          if [ -z "$IDS" ]; then
            IDS="${{ steps.sweep.outputs.ids }}"
            UNTIL="${{ steps.sweep.outputs.until }}"
          fi
          DEADLINE=$(( $(date +%s) + 65*60 ))
          # Respect the window end mid-run: don't loop past it.
          if [ -n "$UNTIL" ]; then
            UNTIL_TS=$(date -u -d "$UNTIL" +%s 2>/dev/null || echo 0)
            if [ "$UNTIL_TS" -gt 0 ] && [ "$UNTIL_TS" -lt "$DEADLINE" ]; then
              DEADLINE=$UNTIL_TS
              echo "Loop deadline capped at window end: $UNTIL UTC"
            fi
          fi
          ITER=0
          PREV_HASH=""
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            ITER=$((ITER+1))
            echo "=== iteration $ITER — $(date -u '+%H:%M:%S UTC') ==="
            python shift1800_live.py --refresh $IDS || echo "compute failed — retrying next iteration"
            # Skip publish when the underlying data hasn't changed (only the
            # ref_date timestamp differs). Prevents commit/deploy spam when a
            # tournament is idle or already finished.
            DATA_HASH=$(jq -S 'del(.ref_date)' world_fide_live_shift1800.json 2>/dev/null | sha256sum | cut -d' ' -f1 || echo "nohash-$ITER")
            if [ "$DATA_HASH" = "$PREV_HASH" ]; then
              echo "Data unchanged since last iteration — skipping publish."
            else
              PREV_HASH="$DATA_HASH"
              python shift1800_html.py || echo "html failed — retrying next iteration"
              (
                cd pages
                git add index.html
                if git diff --cached --quiet; then
                  echo "No changes to publish."
                else
                  git commit -m "Live refresh $(date -u '+%Y-%m-%d %H:%M UTC') (GitHub Actions)"
                  git push origin main || (git pull --rebase origin main && git push origin main)
                fi
              )
            fi
            [ "$(date +%s)" -lt "$DEADLINE" ] && sleep 240
          done
          echo "Loop finished after $ITER iterations."

      - name: Commit enriched FTD caches back
        if: steps.gate.outputs.mode == 'live' || steps.sweep.outputs.found == 'true'
        run: |
          git config user.name "othello-rating-bot"
          git config user.email "actions@github.com"
          git add tournament_*.json
          if git diff --cached --quiet; then
            echo "Caches unchanged."
          else
            git commit -m "Update FTD caches ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git pull --rebase origin main
            git push origin main
          fi
